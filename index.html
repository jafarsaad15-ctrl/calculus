<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ملزمة التفاضل</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
  color: #222;
}

.container {
  max-width: 800px;
  margin: auto;
  padding: 15px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

h1,h2 {
  color: #2d3e50;
}

button {
  background: #2d6a4f;
  color: white;
  border: none;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #1b4332;
}

.hidden {
  display: none;
}
</style>

</head>

<body>

<div class="container">

<!-- عنوان -->
<div class="card">
  <h1>📚 ملزمة التفاضل</h1>
  <p>شرح مبسط + اختبار سريع</p>
</div>

<!-- شرح -->
<div class="card">
  <h2>📐 النهايات</h2>
  <p>نهاية الدالة تعني قيمة الدالة عندما تقترب من نقطة معينة.</p>
  <p><b>مثال:</b> lim(x→2) (x²) = 4</p>
</div>

<!-- الاشتقاق -->
<div class="card">
  <h2>📏 الاشتقاق</h2>
  <p>المشتقة تمثل معدل التغير.</p>
  <p><b>قانون:</b> مشتقة x² = 2x</p>
</div>

<!-- التكامل -->
<div class="card">
  <h2>∫ التكامل</h2>
  <p>التكامل عكس الاشتقاق.</p>
  <p><b>قانون:</b> ∫2x dx = x² + C</p>
</div>

<!-- اختبار -->
<div class="card">
  <h2>📝 اختبار</h2>

  <p>ما مشتقة x³ ؟</p>
  <button onclick="check(1)">3x²</button>
  <button onclick="check(0)">x²</button>

  <p id="result"></p>
</div>

</div>

<script>
function check(correct){
  let r = document.getElementById("result");
  if(correct){
    r.innerHTML = "✅ جواب صحيح";
    r.style.color = "green";
  } else {
    r.innerHTML = "❌ جواب خطأ";
    r.style.color = "red";
  }
}
</script>

</body>
</html>
